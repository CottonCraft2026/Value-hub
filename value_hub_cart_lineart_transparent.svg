<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="cStrokeT" x1="24" y1="0" x2="96" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  style="stop-color:#B8882A"/>
      <stop offset="45%" style="stop-color:#F2D06A"/>
      <stop offset="100%" style="stop-color:#B8882A"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.95  0 0 0 0 0.70  0 0 0 0 0.10  0 0 0 0.4 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Transparent background — no rect -->

  <!-- ─── LINE ART CART, centred at (60, 58) ─── -->
  <g transform="translate(60, 58)"
     fill="none"
     stroke="url(#cStrokeT)"
     stroke-linecap="round"
     stroke-linejoin="round"
     filter="url(#softGlow)">

    <!-- Handle: horizontal bar -->
    <line x1="-36" y1="-34" x2="18"  y2="-34" stroke-width="5.5"/>

    <!-- Handle: vertical left post -->
    <line x1="-36" y1="-34" x2="-36" y2="-8"  stroke-width="5.5"/>

    <!-- Basket — closed trapezoid -->
    <path d="M -36,-8 H 30 L 24,26 H -28 Z" stroke-width="5.5"/>

    <!-- Shelf detail inside basket -->
    <line x1="-30" y1="9" x2="26" y2="9" stroke-width="2.2" opacity="0.45"/>

    <!-- Wheel left -->
    <circle cx="-14" cy="36" r="8.5" stroke-width="5"/>
    <!-- Wheel right -->
    <circle cx="13"  cy="36" r="8.5" stroke-width="5"/>

    <!-- Wheel hub dots -->
    <circle cx="-14" cy="36" r="2.2" fill="url(#cStrokeT)" stroke="none"/>
    <circle cx="13"  cy="36" r="2.2" fill="url(#cStrokeT)" stroke="none"/>

  </g>

</svg>
